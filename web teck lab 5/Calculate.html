<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product Cart</title>
  
</head>
<body>

  <form>
    <fieldset>
      <legend>Product Cart</legend>

      <div class="row">
        <label>Product Name:</label>
        <input type="text" id="productName" value="Asus Vivobook S15" readonly>
      </div>

      <div class="row">
        <label>Product Price:</label>
        <input type="text" id="productPrice" value="50000" readonly>
      </div>

      <div class="row">
        <label>Product Quantity:</label>
        <input type="number" id="quantity" min="1" oninput="calculateAmount()">
        <span id="errorMsg"></span>
      </div>

      <div class="row">
        <label>Payable Amount</label>
        <input type="text" id="payableAmount" value="0" readonly>
      </div>

    </fieldset>
  </form>

  <script src="Calculate.js"></script>
</body>
</html>
