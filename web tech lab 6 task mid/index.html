<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Student Registration Form</h2>

    <form id="regForm">
      <label>First Name <span class="required">*</span></label>
      <input type="text" id="fname">
      <span class="error" id="fnameError"></span>

      <label>Last Name <span class="required">*</span></label>
      <input type="text" id="lname">
      <span class="error" id="lnameError"></span>

      <label>Student ID <span class="required">*</span></label>
      <input type="text" id="sid" placeholder="e.g. 20-12345-1">
      <span class="error" id="sidError"></span>

      <label>Email <span class="required">*</span></label>
      <input type="text" id="email" placeholder="name@student.aiub.edu">
      <span class="error" id="emailError"></span>

      <label>Credit Completed <span class="required">*</span></label>
      <input type="number" id="credit">
      <span class="error" id="creditError"></span>

      <label>Department <span class="required">*</span></label>
      <select id="department">
        <option value="">-- Select Department --</option>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="BBA">BBA</option>
        <option value="English">English</option>
        <option value="Pharmacy">Pharmacy</option>
      </select>
      <span class="error" id="departmentError"></span>

      <div class="btnWrapper">
        <button type="button" onclick="registerStudent()">Submit</button>
      </div>
    </form>
  </div>

  <div class="container table-container">
    <h2>Registered Students</h2>
    <table id="studentTable">
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Student ID</th>
        <th>Email</th>
        <th>Credit Completed</th>
        <th>Department</th>
      </tr>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
